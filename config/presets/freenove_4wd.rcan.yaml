rcan_version: "1.3"

metadata:
  robot_name: "Freenove_4WD_Smart_Car"
  robot_uuid: "00000000-0000-0000-0000-000000000021"
  manufacturer: "Freenove"
  model: "4WD Smart Car Kit"
  author: "OpenCastor Default"
  license: "Apache-2.0"
  tags:
    - 4wd
    - stem
    - arduino
    - esp32
    - beginner
  description: >
    Freenove 4WD Smart Car Kit — a popular STEM robot available in Arduino Uno
    and ESP32 variants. Four DC motors with differential drive, HC-SR04 ultrasonic
    obstacle avoidance, IR line-following sensors, and optional servo pan camera.
    Arduino variant controlled via serial JSON; ESP32 variant via WebSocket.

agent:
  provider: "anthropic"
  model: "claude-sonnet-4-5"
  vision_enabled: false
  latency_budget_ms: 100
  safety_stop: true

physics:
  type: "four_wheel_drive"
  dof: 4
  chassis:
    wheel_base_mm: 130
    track_width_mm: 150
    wheel_radius_mm: 30

drivers:
  - id: "motor_driver"
    protocol: "arduino_serial_json"
    # Arduino Uno/Nano variant: USB serial JSON commands
    # ESP32 variant: swap protocol to esp32_websocket
    port: "/dev/ttyUSB0"
    baud_rate: 115200
    # Motor channels: FL=front-left, FR=front-right, RL=rear-left, RR=rear-right
    channels:
      fl_pwm: 5
      fl_dir: 4
      fr_pwm: 6
      fr_dir: 7
      rl_pwm: 10
      rl_dir: 9
      rr_pwm: 11
      rr_dir: 12
    deadband_pwm: 30
    max_pwm: 200

  - id: "ultrasonic_sensor"
    protocol: "arduino_serial_json"
    port: "/dev/ttyUSB0"
    baud_rate: 115200
    sensor_type: "hcsr04"
    trigger_gpio: 2
    echo_gpio: 3
    max_range_m: 4.0

  - id: "line_sensor"
    protocol: "arduino_serial_json"
    port: "/dev/ttyUSB0"
    baud_rate: 115200
    sensor_type: "ir_line"
    # 3 IR sensors: left, center, right
    sensor_pins: [A0, A1, A2]

  - id: "servo_pan"
    protocol: "arduino_serial_json"
    port: "/dev/ttyUSB0"
    baud_rate: 115200
    sensor_type: "servo"
    gpio: 8
    min_us: 500
    max_us: 2500

connection:
  type: "serial"
  port: "/dev/ttyUSB0"
  baud_rate: 115200
  reconnect_interval_ms: 2000

network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: true

rcan_protocol:
  port: 8000
  capabilities: [status, nav, teleop, chat]
  enable_mdns: false
  enable_jwt: false

safety:
  obstacle_stop_cm: 15
  estop_on_startup: false
  max_linear_speed_mps: 0.5

notes:
  firmware: >
    Flash Arduino IDE sketch from Freenove tutorial code.
    Sketch must accept JSON commands on Serial:
      {"cmd":"drive","fl":150,"fr":150,"rl":150,"rr":150,"ms":500}
      {"cmd":"stop"}
      {"cmd":"sensor","id":"hcsr04"}
    ESP32 variant: change motor_driver protocol to esp32_websocket
    and set host: "192.168.4.1" (AP mode) or your router-assigned IP.
  hardware:
    mcu_option_1: "Arduino Uno R3 (serial via USB)"
    mcu_option_2: "ESP32-WROOM-32 (WiFi WebSocket)"
    motor_driver: "L298N dual H-bridge"
    ultrasonic: "HC-SR04"
    line_sensors: "3× IR reflective sensor (TCRT5000)"
    battery: "7.4V 2S LiPo or 6× AA"
  purchase: >
    Kit available on Amazon (~$30–50). Includes all hardware, chassis,
    Freenove tutorial code, and detailed PDF guide. Great first robot.
