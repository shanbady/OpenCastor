name: RCAN Spec Validation

on:
  push:
    paths:
      - '**.rcan.yaml'
      - '**.rcan.yml'
      - 'config/**'
  pull_request:
    paths:
      - '**.rcan.yaml'
      - '**.rcan.yml'
      - 'config/**'

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    name: "Validate Robot Configs"

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install jsonschema pyyaml

      - name: Validate Configs against RCAN Schema
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir config/presets
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir tests/fixtures
