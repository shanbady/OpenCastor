# Minimal OpenCastor config — copy and edit this.
# Full docs: https://opencastor.com/docs/config/

rcan_version: "1.3"

metadata:
  robot_name: my-robot
  manufacturer: custom
  model: custom-v1
  version: v1

agent:
  provider: anthropic           # or: google, openai, mock
  model: claude-sonnet-4-5      # or: gemini-2.5-flash, gpt-4o

drivers: []

safety:
  max_linear_velocity_ms: 0.5
  max_angular_velocity_rads: 1.0
  estop_enabled: true

rcan_protocol:
  enabled: true
