name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: "Deploy Site"
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@14a01e75a3f7f0fc04f0bfc97c87ebf06a3b2ac7  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./site --project-name=opencastor --branch=main --commit-dirty=true
