# castor/harness/default_harness.yaml
# Canonical default agent harness for OpenCastor.
# Automatically updated by the harness-research CI pipeline when a better config is found.
# Keep in sync with: opencastor-client HarnessConfig.defaults() and website/src/pages/docs/harness.astro

harness:
  enabled: true
  max_iterations: 6
  thinking_budget: 1024
  context_budget: 8192
  p66_consent_threshold: physical
  retry_on_error: true
  drift_detection: true
  cost_gate_usd: 0.05

  layers:
    # ── ALWAYS-ON SAFETY INVARIANTS ──────────────────────────────────
    - id: hook-p66
      type: hook
      label: P66 Safety
      description: "ESTOP bypass · Scope enforcement · Physical consent"
      enabled: true
      can_disable: false
      can_reorder: false
      config:
        p66_audit: true

    # ── SECURITY & VALIDATION ────────────────────────────────────────
    - id: prompt-guard
      type: guard
      label: Prompt Guard
      description: "Blocks jailbreak, injection, and role-switch attempts"
      enabled: true
      config:
        block_jailbreak: true
        block_injection: true
        block_role_switch: true
        risk_threshold: 0.6

    # ── CONTEXT ASSEMBLY ─────────────────────────────────────────────
    - id: context-builder
      type: context
      label: Context Builder
      description: "Memory · Telemetry · Skills · System prompt"
      enabled: true
      can_disable: false
      can_reorder: false
      config:
        memory: true
        telemetry: true
        system_prompt: true
        skills_context: true
        rcan_identity: true

    # ── WORKING MEMORY ───────────────────────────────────────────────
    - id: working-memory
      type: memory
      label: Working Memory
      description: "Per-session scratchpad for multi-step reasoning"
      enabled: true
      config:
        max_entries: 50
        ttl_s: 1800
        persist: false

    # ── SKILLS ───────────────────────────────────────────────────────
    - id: skill-navigate-to
      type: skill
      label: navigate-to
      description: "Autonomous waypoint navigation"
      enabled: true
      config:
        order: 0

    - id: skill-camera-describe
      type: skill
      label: camera-describe
      description: "Describe scene from camera feed"
      enabled: true
      config:
        order: 1

    - id: skill-web-lookup
      type: skill
      label: web-lookup
      description: "Web search and knowledge retrieval"
      enabled: true
      config:
        order: 2

    - id: skill-arm-manipulate
      type: skill
      label: arm-manipulate
      description: "Arm/gripper manipulation primitives"
      enabled: false
      config:
        order: 3

    - id: skill-peer-coordinate
      type: skill
      label: peer-coordinate
      description: "Multi-robot coordination via RCAN"
      enabled: false
      config:
        order: 4

    # ── CONFIDENCE & SAFETY GATES ────────────────────────────────────
    - id: circuit-breaker
      type: circuit_breaker
      label: Circuit Breaker
      description: "Disables skills after 3 failures; resets after 30s"
      enabled: true
      config:
        failure_threshold: 3
        cooldown_s: 30
        half_open_probe: true

    - id: hitl-physical
      type: hitl
      label: Physical HITL Gate
      description: "Operator approval required for physical actions"
      enabled: true
      config:
        timeout_s: 30
        on_timeout: block
        require_auth: true
        action_types:
          - move
          - actuate
          - grip
          - rotate
          - extend
          - retract

    # ── MODEL ROUTING ────────────────────────────────────────────────
    - id: model-dual
      type: model
      label: Dual Model
      description: "Fast local (Gemma 3) · Slow cloud (Gemini 2.5) by confidence"
      enabled: true
      can_disable: false
      can_reorder: false
      config:
        fast_provider: ollama
        fast_model: "gemma3:1b"
        slow_provider: google
        slow_model: "gemini-2.5-flash"
        confidence_threshold: 0.72

    # ── COST & DRIFT MONITORING ──────────────────────────────────────
    - id: cost-gate
      type: cost_gate
      label: Cost Gate
      description: "Halts if LLM spend exceeds $0.10/session"
      enabled: true
      config:
        budget_usd: 0.10
        on_exceed: block
        alert_at_pct: 80

    - id: hook-drift
      type: hook
      label: Drift Detection
      description: "Detects model off-task drift after 3+ iterations"
      enabled: true
      config:
        drift_threshold: 0.15

    # ── OBSERVABILITY ────────────────────────────────────────────────
    - id: span-tracer
      type: tracer
      label: Span Tracer
      description: "OpenTelemetry-style execution traces → SQLite"
      enabled: true
      config:
        export: sqlite
        db_path: traces.db

    - id: dlq
      type: dlq
      label: Dead Letter Queue
      description: "Failed commands queued for human review"
      enabled: true
      config:
        db_path: dlq.db
        max_size: 500

    # ── AUDIT (always-on, always last) ───────────────────────────────
    - id: trajectory-logger
      type: trajectory
      label: Trajectory Logger
      description: >
        Always-on audit trail — every run logged to SQLite.
        Required for autoresearch and RCAN compliance.
      enabled: true
      can_disable: false
      can_reorder: false
      config:
        sqlite_path: trajectory.db
