rcan_version: "1.3"

metadata:
  robot_name: "Unitree_Go2"
  robot_uuid: "00000000-0000-0000-0000-000000000019"
  manufacturer: "Unitree Robotics"
  model: "Go2"
  author: "OpenCastor Default"
  license: "Apache-2.0"
  tags:
    - quadruped
    - legged
    - research
    - outdoor
    - lidar
  description: >
    Unitree Go2 — a dynamic quadruped research platform with 12-DOF legged
    locomotion, Hesai XT16 3D lidar, and stereo depth camera. Capable of
    traversing complex terrain indoors and outdoors. Controlled via
    Unitree SDK2 (Python/C++) over Ethernet or WiFi. Max speed ~3.7 m/s.

agent:
  provider: "anthropic"
  model: "claude-sonnet-4-5"
  vision_enabled: true
  latency_budget_ms: 100
  safety_stop: true

physics:
  type: "custom"
  dof: 12
  # 4 legs × 3 joints (hip, thigh, calf) = 12 DOF

camera:
  type: "usb"
  resolution: [1280, 720]
  framerate: 30
  depth_enabled: true

drivers:
  - id: "unitree_sdk2"
    protocol: "unitree_sdk2"
    # Connect via Go2's built-in WiFi hotspot or Ethernet
    host: "192.168.123.161"
    port: 8082
    # High-level locomotion API (velocity commands, gaits)
    api_version: "2.0"
    gait_modes:
      - trot
      - crawl
      - stair_climb
      - stand

  - id: "lidar_hesai_xt16"
    protocol: "unitree_sdk2"
    sensor_type: "lidar"
    model: "Hesai XT16"
    host: "192.168.123.161"
    point_cloud_topic: "/utlidar/cloud"
    scan_range_m: 120.0
    channel_count: 16

  - id: "depth_camera"
    protocol: "unitree_sdk2"
    sensor_type: "depth_camera"
    model: "Go2 Stereo Depth"
    host: "192.168.123.161"
    topics:
      rgb: "/camera/image_raw"
      depth: "/camera/depth"

  - id: "imu"
    protocol: "unitree_sdk2"
    sensor_type: "imu"
    host: "192.168.123.161"

connection:
  type: "ethernet"
  host: "192.168.123.161"
  reconnect_interval_ms: 1000
  watchdog_timeout_ms: 500

network:
  telemetry_stream: true
  sim_to_real_sync: false
  allow_remote_override: false

rcan_protocol:
  port: 8000
  capabilities: [status, nav, teleop, chat, vision]
  enable_mdns: true
  enable_jwt: true

safety:
  obstacle_stop_cm: 40
  estop_on_startup: true
  max_linear_speed_mps: 3.7
  max_angular_speed_radps: 3.14
  hardware_watchdog_mcu: true
  physical_estop: true
  human_proximity_sensors: "depth_camera"
  sil_level: "PLc"
  voltage_monitoring: true
  payload_kg: 5.0

notes:
  setup: >
    Install Unitree SDK2: pip install unitree_sdk2py
    Connect to Go2 WiFi hotspot (SSID: UnitreeGo2_XXXXXX) or Ethernet.
    Robot IP: 192.168.123.161 (default).
    Enable sports mode via the app before autonomous operation.
    Unitree Go2 EDU variant required for full SDK/API access.
  hardware:
    compute: "Unitree internal PC (Intel® RealSense™ Vision)"
    lidar: "Hesai XT16 (16-channel 3D, 120m range)"
    battery: "5200mAh (approx 1-2h runtime)"
    max_payload_kg: 5.0
  warning: >
    High-power legged robot — clear the area before operation.
    Always engage e-stop when near people. Never operate at full
    speed (3.7 m/s) indoors.
